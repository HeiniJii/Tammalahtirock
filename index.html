<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tammalahtirock 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            background-color: #0b0214; color: #ffffff;
        }
        header {
            position: relative;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0) 80%, #0b0214 100%), url('tammalahti_banner.png');
            background-size: contain; background-repeat: no-repeat; background-position: center top;
            width: 100%; aspect-ratio: 16 / 7; max-height: 500px;
        }
        .countdown-overlay {
            position: absolute; top: 4.8%; left: 17.8%; color: #ff007f;
            font-family: 'Courier New', Courier, monospace; font-size: 2vw; font-weight: bold;
            text-shadow: 0 0 8px #ff007f, 0 0 20px #ff007f; z-index: 10;
            pointer-events: none; letter-spacing: 1px; background-color: #0b0214; padding: 0 2px;
        }
        nav {
            position: -webkit-sticky; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: center; background-color: rgba(31, 31, 47, 0.95);
            border-bottom: 2px solid #ff007f; padding: 10px 5px; overflow-x: auto;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); backdrop-filter: blur(5px); gap: 8px;
        }
        nav button {
            background: rgba(18, 18, 18, 0.6); border: 1px solid rgba(255, 0, 127, 0.5);
            color: #fff; padding: 10px 18px; cursor: pointer; font-size: 14px;
            transition: all 0.3s ease; white-space: nowrap; font-weight: bold;
            border-radius: 20px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }
        nav button:hover, nav button.active {
            background-color: #ff007f; color: white; border-color: #ff007f;
            box-shadow: 0 0 12px #ff007f, 0 0 5px #00f0ff; transform: translateY(-1px);
        }
        .container {
            padding: 20px; max-width: 800px; margin: 20px auto;
            background: rgba(20, 10, 30, 0.6); border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px; box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            box-sizing: border-box; padding-bottom: 60px;
        }
        .page { display: none; }
        .page.active { display: block; }
        h2 { color: #00f0ff; text-shadow: 0 0 8px rgba(0, 240, 255, 0.5); border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding-bottom: 8px; margin-top: 0; }
        .card { background-color: #150d22; padding: 20px; margin-bottom: 15px; border-radius: 8px; border-left: 5px solid #00f0ff; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .news-flash { border-left-color: #00f0ff; }
        .pass { background: linear-gradient(45deg, #ff007f, #7928ca); padding: 30px; text-align: center; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .festival-name { font-size: 26px; font-weight: bold; margin: 15px 0; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .map-wrapper { width: 100%; border-radius: 8px; overflow: hidden; border: 2px solid #00f0ff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); background-color: #150d22; }
        .map-wrapper img { width: 100%; height: auto; display: block; }
        .schedule-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .schedule-controls button { flex: 1; background: #150d22; border: 1px solid #00f0ff; color: #00f0ff; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .schedule-controls button.active { background: #00f0ff; color: #0b0214; box-shadow: 0 0 10px #00f0ff; }
        .schedule-section { display: none; }
        .schedule-section.active { display: block; }
        .day-title { color: #ff007f; font-weight: bold; margin: 20px 0 10px 0; text-transform: uppercase; letter-spacing: 1px; font-size: 16px; }
        .grid-timetable { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; }
        .grid-row { display: grid; grid-template-columns: 80px 1fr 120px; background: #170e28; border: 1px solid rgba(255, 0, 127, 0.15); border-radius: 6px; overflow: hidden; }
        .grid-row.header-row { background: rgba(255, 0, 127, 0.2); border-color: #ff007f; font-weight: bold; color: #ff007f; }
        .grid-cell { padding: 10px; display: flex; align-items: center; font-size: 14px; }
        .grid-cell.time { background: rgba(0, 240, 255, 0.05); color: #00f0ff; font-family: monospace; justify-content: center; border-right: 1px solid rgba(0, 240, 255, 0.15); }
        .grid-cell.who { color: #ffcc00; font-style: italic; justify-content: flex-end; text-align: right; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .gallery-item { position: relative; height: 140px; border-radius: 8px; overflow: hidden; background-color: #333; border: 1px solid rgba(255,0,127,0.2); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-item .author-tag { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(11, 2, 20, 0.85); color: #00f0ff; font-size: 10px; padding: 4px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stamps-grid { display: flex; justify-content: space-around; margin: 20px 0; gap: 10px; }
        .stamp-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; flex: 1; font-size: 12px; border: 2px dashed #aaa; text-align: center; }
        .stamp-box.checked { border-color: #00f0ff; background: rgba(0, 240, 255, 0.2); font-weight: bold; box-shadow: 0 0 8px #00f0ff; }
        .my-stamps { margin-top: 20px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; text-align: left; }
        @media (min-width: 1000px) { .countdown-overlay { font-size: 20px; top: 24px; left: 178px; } }
        @media (max-width: 500px) { .grid-row { grid-template-columns: 65px 1fr 90px; } .grid-cell { font-size: 12px; padding: 6px; } }
    </style>
</head>
